<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>100% Free AI Background Remover</title>
    <style>
        :root {
            --bg: #0f172a;
            --card: #1e293b;
            --accent: #6366f1;
            --accent-hover: #4f46e5;
            --text: #f8fafc;
            --text-muted: #94a3b8;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 40px 20px;
            display: flex;
            justify-content: center;
        }
        .container {
            max-width: 900px;
            width: 100%;
            background: var(--card);
            padding: 40px;
            border-radius: 24px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            text-align: center;
        }
        h1 { font-size: 2.5rem; margin-bottom: 10px; font-weight: 800; }
        p { color: var(--text-muted); margin-bottom: 30px; font-size: 1.1rem; }
        .upload-area {
            border: 3px dashed #475569;
            padding: 50px 20px;
            border-radius: 16px;
            cursor: pointer;
            background: #111827;
            transition: all 0.2s ease;
        }
        .upload-area:hover {
            border-color: var(--accent);
            background: #1e1b4b;
        }
        #fileInput { display: none; }
        .loading {
            margin: 25px 0;
            font-size: 1.2rem;
            color: var(--accent);
            font-weight: 600;
            display: none;
        }
        .workspace {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            margin-top: 40px;
        }
        @media (max-width: 680px) {
            .workspace { grid-template-columns: 1fr; }
        }
        .img-box {
            background: #0f172a;
            padding: 15px;
            border-radius: 12px;
            border: 1px solid #334155;
        }
        h3 { margin-top: 0; color: var(--text-muted); font-size: 1rem; text-transform: uppercase; letter-spacing: 1px; }
        img {
            max-width: 100%;
            max-height: 400px;
            border-radius: 8px;
            display: block;
            margin: 0 auto;
        }
        .transparent-bg img {
            background-image: linear-gradient(45deg, #334155 25%, transparent 25%), 
                              linear-gradient(-45deg, #334155 25%, transparent 25%), 
                              linear-gradient(45deg, transparent 75%, #334155 75%), 
                              linear-gradient(-45deg, transparent 75%, #334155 75%);
            background-size: 20px 20px;
            background-position: 0 0, 0 10px, 10px -10px, -10px 0px;
        }
        .btn {
            display: inline-block;
            margin-top: 20px;
            padding: 14px 30px;
            background: #10b981;
            color: white;
            text-decoration: none;
            border-radius: 12px;
            font-weight: 700;
            font-size: 1.1rem;
            border: none;
            cursor: pointer;
            transition: background 0.2s;
            display: none;
        }
        .btn:hover { background: #059669; }
    </style>
</head>
<body>

<div class="container">
    <h1>AI Background Remover</h1>
    <p>100% Free • High Quality • No Logins • Fully Private</p>
    
    <div class="upload-area" onclick="document.getElementById('fileInput').click()">
        <svg width="50" height="50" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" style="color: var(--text-muted); margin-bottom: 15px;"><path d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z" stroke-linecap="round" stroke-linejoin="round"></path></svg>
        <div style="font-size: 1.2rem; font-weight: 600;">Click or Drop Image Here</div>
    </div>
    <input type="file" id="fileInput" accept="image/*">

    <div class="loading" id="loader">🧠 AI is isolating edges... Please wait.</div>

    <div class="workspace" id="showcase" style="display: none;">
        <div class="img-box">
            <h3>Original</h3>
            <img id="viewOriginal" src="">
        </div>
        <div class="img-box">
            <h3>Result</h3>
            <div class="transparent-bg">
                <img id="viewResult" src="">
            </div>
            <a id="downloadLink" class="btn" href="#" download="no-background.png">Download Transparent HD</a>
        </div>
    </div>
</div>

<script type="module">
    import { removeBackground } from 'https://cdn.jsdelivr.net/npm/@imgly/background-removal@1.5.5/+esm';

    const fileInput = document.getElementById('fileInput');
    const loader = document.getElementById('loader');
    const showcase = document.getElementById('showcase');
    const viewOriginal = document.getElementById('viewOriginal');
    const viewResult = document.getElementById('viewResult');
    const downloadLink = document.getElementById('downloadLink');

    fileInput.addEventListener('change', async (e) => {
        const file = e.target.files[0];
        if (!file) return;

        // Display original picture instantly
        viewOriginal.src = URL.createObjectURL(file);
        showcase.style.display = 'grid';
        loader.style.display = 'block';
        downloadLink.style.display = 'none';
        viewResult.src = ''; 

        try {
            // Process the cutout completely inside the user's browser
            const processedBlob = await removeBackground(file, {
                model: 'medium', // High-fidelity edge mapping
                output: { format: 'image/png', quality: 1.0 }
            });

            const finalUrl = URL.createObjectURL(processedBlob);
            viewResult.src = finalUrl;
            
            // Activate download
            downloadLink.href = finalUrl;
            downloadLink.style.display = 'inline-block';
            loader.style.display = 'none';
        } catch (err) {
            console.error(err);
            loader.innerText = "⚠️ Failed to process image. Make sure the subject is clear.";
        }
    });
</script>

</body>
</html>
